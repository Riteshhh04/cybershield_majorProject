{% extends "base.html" %}

{% block title %}Forgot Password - CyberShield{% endblock %}

{% block content %}

<nav class="navbar">
    <a href="{{ url_for('index') }}" class="navbar-brand">
        <i class="fas fa-shield-alt"></i> CyberShield
    </a>
</nav>

<div class="container" style="margin-top: 80px;">
    <div style="max-width: 400px; margin: 0 auto;">

        <div class="card">
            <div class="card-body">

                <div class="page-header">
                    <h2 class="page-title">
                        <i class="fas fa-key"></i> Forgot Password
                    </h2>

                    <p class="page-subtitle">
                        Enter your Moodle ID to reset password
                    </p>
                </div>

                <form method="POST">

                    <div class="form-group">
                        <label class="form-label">
                            <i class="fas fa-user"></i> Moodle ID
                        </label>

                        <input type="text"
                               name="username"
                               class="form-input"
                               placeholder="Enter your Moodle ID"
                               required>
                    </div>

                    <button type="submit" class="btn btn-primary btn-full">
                        <i class="fas fa-sync"></i> Reset Password
                    </button>

                </form>

            </div>
        </div>

    </div>
</div>

{% endblock %}
