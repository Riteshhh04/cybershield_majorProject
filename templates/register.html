<!-- templates/register.html -->
{% extends "base.html" %}

{% block title %}Register - CyberShield{% endblock %}

{% block content %}
<nav class="navbar">
    <a href="{{ url_for('index') }}" class="navbar-brand">
        <i class="fas fa-shield-alt"></i> CyberShield
    </a>
</nav>

<div class="container" style="margin-top: 50px;">
    <div style="max-width: 500px; margin: 0 auto;">
        <div class="card">
            <div class="card-body">
                <div class="page-header">
                    <h2 class="page-title">
                        <i class="fas fa-user-shield"></i> Join CyberShield
                    </h2>

                    <p class="page-subtitle">
                    Create your secure account and start exploring cybersecurity learning modules.
                    </p>
                </div>

                <form id="registerForm">
                    <div class="form-group">
                        <label class="form-label">
                            <i class="fas fa-user"></i> Full Name
                        </label>
                        <input type="text" name="full_name" class="form-input" required 
                               placeholder="Enter your full name" autocomplete="name">
                    </div>

                    <div class="form-group">
                        <label class="form-label">
                            <i class="fas fa-envelope"></i> Email Address
                        </label>
                        <input type="email" name="email" class="form-input" required 
                               placeholder="your.email@example.com" autocomplete="email">
                    </div>

                    <div class="form-group">
                        <label class="form-label">
                            <i class="fas fa-phone"></i> Phone Number
                        </label>
                        <input type="tel" name="phone" class="form-input" required 
                               placeholder="+1 (555) 123-4567" autocomplete="tel">
                    </div>

                    <div class="form-group">
                        <label class="form-label">
                            <i class="fas fa-user-secret"></i> Cybersecurity Learning Track
                        </label>
                        <select name="course" class="form-input form-select" required>

                            <option value="">Select cybersecurity course</option>

                            <option value="Ethical Hacking Fundamentals">
                            Ethical Hacking Fundamentals
                            </option>

                            <option value="Network Security and Intrusion Detection">
                            Network Security and Intrusion Detection
                            </option>

                            <option value="Web Application Security">
                            Web Application Security
                            </option>

                            <option value="Malware Analysis Basics">
                            Malware Analysis Basics
                            </option>

                            <option value="Digital Forensics">
                            Digital Forensics
                            </option>

                            <option value="Penetration Testing and Vulnerability Assessment">
                            Penetration Testing and Vulnerability Assessment
                            </option>

                            <option value="Cyber Threat Intelligence">
                            Cyber Threat Intelligence
                            </option>

                            <option value="Cloud Security Fundamentals">
                            Cloud Security Fundamentals
                            </option>

                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary btn-full">
                        <i class="fas fa-shield-alt"></i> Create Secure Account
                    </button>
                </form>

                <div class="form-divider">
                    <p>Already have an account?</p>
                    <a href="{{ url_for('login') }}" class="btn btn-secondary">
                        <i class="fas fa-lock"></i> Secure Login
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
